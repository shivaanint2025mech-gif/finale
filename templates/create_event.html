{% extends "base.html" %}
{% block body_content %}
<nav class="navbar navbar-expand-lg navbar-custom sticky-top mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="#"><i class="fa-solid fa-calendar-plus me-2"></i>EventHub</a>
    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-grad btn-sm">Back</a>
  </div>
</nav>

<div class="container py-3">
    <div class="glass-card p-4">
        <h3 class="fw-bold mb-4"><i class="fa-solid fa-pen-to-square me-2"></i>Create New Event</h3>
        <form method="POST" enctype="multipart/form-data">
            <!-- Basic Info Accordion -->
            <div class="accordion" id="eventFormAccordion">
                <!-- Section 1: Basic Info -->
                <div class="accordion-item mb-3" style="border-radius:15px; overflow:hidden;">
                    <h2 class="accordion-header">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#basicInfo">
                            <i class="fa-solid fa-info-circle me-2"></i> Basic Information
                        </button>
                    </h2>
                    <div id="basicInfo" class="accordion-collapse collapse show">
                        <div class="accordion-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label>Academic Year</label>
                                    <select name="academic_year" class="form-select" required>
                                        <option value="25-26">25-26</option>
                                        <option value="26-27">26-27</option>
                                        <option value="27-28">27-28</option>
                                        <option value="28-29">28-29</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label>Semester</label>
                                    <select name="semester" class="form-select" required>
                                        <option value="odd">Odd</option>
                                        <option value="even">Even</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label>Event Type</label>
                                    <select name="event_type" id="event_type" class="form-select" required>
                                        <option value="FDP">FDP</option>
                                        <option value="guest lecture">Guest Lecture</option>
                                        <option value="conference">Conference</option>
                                        <option value="workshop">Workshop</option>
                                        <option value="value added course">Value Added Course</option>
                                        <option value="training program">Training Program</option>
                                        <option value="hands on session">Hands on Session</option>
                                        <option value="others">Others</option>
                                    </select>
                                </div>
                                <div class="col-md-6" id="other_type_div" style="display:none;">
                                    <label>Specify Other</label>
                                    <input name="other_event_type" class="form-control">
                                </div>
                                <div class="col-12">
                                    <label>Title of the Event</label>
                                    <input name="title" class="form-control" required>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 2: Date & Venue -->
                <div class="accordion-item mb-3" style="border-radius:15px; overflow:hidden;">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#dateVenue">
                            <i class="fa-solid fa-calendar-days me-2"></i> Date, Time & Venue
                        </button>
                    </h2>
                    <div id="dateVenue" class="accordion-collapse collapse">
                        <div class="accordion-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label>Start Date</label>
                                    <input type="date" name="start_date" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label>End Date</label>
                                    <input type="date" name="end_date" class="form-control" required>
                                </div>
                                <div class="col-md-4">
                                    <label>Start Time</label>
                                    <input type="time" name="start_time" class="form-control" required>
                                </div>
                                <div class="col-md-4">
                                    <label>End Time</label>
                                    <input type="time" name="end_time" class="form-control" required>
                                </div>
                                <div class="col-md-4">
                                    <label>Duration (HH:MM)</label>
                                    <input name="duration" class="form-control" placeholder="e.g., 2:30" required>
                                </div>
                                <div class="col-12">
                                    <label>Venue</label>
                                    <input name="venue" class="form-control" required>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 3: Coordinator & Participants -->
                <div class="accordion-item mb-3" style="border-radius:15px; overflow:hidden;">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#coordinator">
                            <i class="fa-solid fa-user-tie me-2"></i> Coordinator & Participants
                        </button>
                    </h2>
                    <div id="coordinator" class="accordion-collapse collapse">
                        <div class="accordion-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label>Coordinator Name</label>
                                    <input name="coordinator_name" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label>Contact Details</label>
                                    <input name="coordinator_contact" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label>Coordinator Email</label>
                                    <input type="email" name="coordinator_email" class="form-control" required>
                                </div>
                                <div class="col-md-6">
                                    <label>Batch</label>
                                    <select name="batch" class="form-select" required>
                                        <option value="21-25">21-25</option>
                                        <option value="22-26">22-26</option>
                                        <option value="23-27">23-27</option>
                                        <option value="24-28">24-28</option>
                                        <option value="25-29">25-29</option>
                                        <option value="26-30">26-30</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 4: Chief Guest -->
                <div class="accordion-item mb-3" style="border-radius:15px; overflow:hidden;">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#chiefGuest">
                            <i class="fa-solid fa-star me-2"></i> Chief Guest Details
                        </button>
                    </h2>
                    <div id="chiefGuest" class="accordion-collapse collapse">
                        <div class="accordion-body">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label>Name</label>
                                    <input name="chief_guest_name" class="form-control" required>
                                </div>
                                <div class="col-md-4">
                                    <label>Designation</label>
                                    <input name="chief_guest_designation" class="form-control" required>
                                </div>
                                <div class="col-md-4">
                                    <label>Industry/Institution</label>
                                    <input name="chief_guest_institution" class="form-control" required>
                                </div>
                                <div class="col-md-8">
                                    <label>Profile URL (optional)</label>
                                    <input name="chief_guest_url" class="form-control" placeholder="https://...">
                                </div>
                                <div class="col-md-4">
                                    <label>Upload Profile (PDF/Image)</label>
                                    <input type="file" name="chief_guest_profile" class="form-control">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 5: Uploads -->
                <div class="accordion-item mb-3" style="border-radius:15px; overflow:hidden;">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#uploads">
                            <i class="fa-solid fa-upload me-2"></i> Uploads
                        </button>
                    </h2>
                    <div id="uploads" class="accordion-collapse collapse">
                        <div class="accordion-body">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label>Upload Flier (Image/PDF)</label>
                                    <input type="file" name="flier" class="form-control">
                                </div>
                                <div class="col-md-6">
                                    <label>Upload Permission Letter (PDF/Image)</label>
                                    <input type="file" name="permission_letter" class="form-control">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="text-end mt-4">
                <button type="submit" class="btn btn-grad btn-lg"><i class="fa-solid fa-paper-plane me-2"></i>Create Event</button>
            </div>
        </form>
    </div>
</div>
<script>
    document.getElementById('event_type').addEventListener('change', function(){
        document.getElementById('other_type_div').style.display = this.value==='others' ? 'block' : 'none';
    });
</script>
{% endblock %}
