{% extends "base.html" %}
{% block body_content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-key fs-1" style="color:#667eea;"></i>
                <h3 class="mt-3 fw-bold">Forgot Password</h3>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label>Enter your registered email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-grad w-100">Send Reset Link</button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('login') }}" class="text-decoration-none" style="color:#667eea;">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
