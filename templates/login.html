{% extends "base.html" %}
{% block body_content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-calendar-check fs-1" style="color:#667eea;"></i>
                <h3 class="mt-3 fw-bold">Welcome Back</h3>
                <p class="text-muted">Sign in to manage events</p>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label><i class="fa-solid fa-envelope me-2"></i>Email</label>
                    <input type="email" name="email" class="form-control" required value="{{ reset_email }}">
                </div>
                <div class="mb-3">
                    <label><i class="fa-solid fa-lock me-2"></i>Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-grad w-100 mt-3">Login</button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('forgot_password') }}" class="text-decoration-none text-muted">Forgot password?</a>
            </div>
            <div class="text-center mt-2">
                <span class="text-muted">Don't have an account?</span>
                <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold" style="color:#667eea;">Register</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
