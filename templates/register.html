{% extends "base.html" %}
{% block body_content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="col-md-7 col-lg-5">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-user-plus fs-1" style="color:#667eea;"></i>
                <h3 class="mt-3 fw-bold">Create Account</h3>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label>I am a</label>
                    <select name="role" class="form-select" required>
                        <option value="faculty">Faculty</option>
                        <option value="student">Student</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label>Full Name</label>
                    <input name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Designation (optional)</label>
                    <input name="designation" class="form-control">
                </div>
                <button type="submit" class="btn btn-grad w-100 mt-3">Register</button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('login') }}" class="text-decoration-none" style="color:#667eea;">Already have an account? Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
