{% extends "base.html" %}
{% block body_content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">
    <div class="col-md-5 col-lg-4">
        <div class="glass-card p-5">
            <div class="text-center mb-4">
                <i class="fa-solid fa-lock-open fs-1" style="color:#667eea;"></i>
                <h3 class="mt-3 fw-bold">Set New Password</h3>
            </div>
            <form method="POST">
                <input type="password" name="password" class="form-control mb-3" placeholder="New password" required>
                <button type="submit" class="btn btn-grad w-100">Update Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
